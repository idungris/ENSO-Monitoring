name: Update ENSO Dashboard

on:
  schedule:
    # Jam 06:00 WIB = 23:00 UTC
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  run-dashboard:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libnetcdf-dev libhdf5-dev libcurl4-openssl-dev
          
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install xarray netcdf4 matplotlib pandas numpy folium branca requests
          
      - name: Run dashboard script
        run: python dashboard.py
        
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
          force_orphan: true
